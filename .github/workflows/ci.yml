name: CI/CD

on:
  push:
    branches: ['main', 'master']
  pull_request:
    branches: ['main', 'master']
  workflow_dispatch:
  schedule:
    # Weekly schedule for regression detection
    - cron: '0 2 * * 1'

# Sets permissions of the GITHUB_TOKEN
permissions:
  contents: read
  pages: write
  id-token: write
  checks: write
  pull-requests: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress
concurrency:
  group: 'ci-${{ github.ref }}-${{ github.workflow }}'
  cancel-in-progress: true

env:
  # Pin Node.js version for reproducible builds
  NODE_VERSION: '24.0.0'
  # Cache versions for reproducibility
  NPM_CACHE_VERSION: '3'
  PLAYWRIGHT_CACHE_VERSION: '1'
  RUST_CACHE_VERSION: '1'

jobs:
  # =======================================================================
  # LINT & TYPE CHECK (Fast, runs first)
  # =======================================================================
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0  # Needed for commit message linting

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Cache node_modules
        uses: actions/cache@v5
        id: node-modules-cache
        with:
          path: node_modules
          key: ${{ runner.os }}-node-modules-${{ env.NPM_CACHE_VERSION }}-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-modules-${{ env.NPM_CACHE_VERSION }}-

      - name: Cache TypeScript incremental build info
        uses: actions/cache@v5
        id: ts-build-cache
        with:
          path: .tsbuildinfo
          key: ${{ runner.os }}-tsbuild-${{ env.NPM_CACHE_VERSION }}-${{ hashFiles('tsconfig.json') }}-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-tsbuild-${{ env.NPM_CACHE_VERSION }}-

      - name: Install dependencies
        if: steps.node-modules-cache.outputs.cache-hit != 'true'
        run: npm ci --legacy-peer-deps

      - name: Run ESLint (with cache)
        run: npm run lint -- --cache --max-warnings=0

      - name: Run TypeScript type check
        id: tsc-check
        run: |
          npx tsc --noEmit 2>&1 | tee tsc-output.txt

      - name: TypeScript errors summary
        if: always()
        run: |
          if [ -f tsc-output.txt ]; then
            ERROR_COUNT=$(grep -c "error TS" tsc-output.txt || true)
          else
            ERROR_COUNT=0
          fi
          echo "TypeScript Errors: $ERROR_COUNT" >> $GITHUB_STEP_SUMMARY
          if [ "$ERROR_COUNT" -gt 0 ]; then
            echo "⚠️ **Pre-existing TypeScript errors found** (non-blocking)"
            grep "error TS" tsc-output.txt | head -20 >> $GITHUB_STEP_SUMMARY
          else
            echo "✅ No TypeScript errors"
          fi

      - name: Run Commitlint (if PR)
        if: github.event_name == 'pull_request'
        run: |
          npm install -g @commitlint/cli @commitlint/config-conventional
          git fetch origin main
          commitlint --from=origin/main --to=HEAD --verbose

  # =======================================================================
  # UNIT TESTS (Fast, parallelizable)
  # =======================================================================
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [lint, wasm-build]
    strategy:
      matrix:
        node-version: ['22', '24']
      fail-fast: false
    steps:
      - uses: actions/checkout@v7

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Cache node_modules
        uses: actions/cache@v5
        id: node-modules-cache
        with:
          path: node_modules
          key: ${{ runner.os }}-node-modules-${{ env.NPM_CACHE_VERSION }}-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-modules-${{ env.NPM_CACHE_VERSION }}-

      - name: Cache TypeScript incremental build info
        uses: actions/cache@v5
        id: ts-build-cache
        with:
          path: .tsbuildinfo
          key: ${{ runner.os }}-tsbuild-${{ env.NPM_CACHE_VERSION }}-${{ hashFiles('tsconfig.json') }}-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-tsbuild-${{ env.NPM_CACHE_VERSION }}-

      - name: Install dependencies
        if: steps.node-modules-cache.outputs.cache-hit != 'true'
        run: npm ci --legacy-peer-deps

      - name: Rebuild native bindings (fixes npm optional deps bug)
        run: npm rebuild rolldown vite

      - name: Download WASM build artifact
        uses: actions/download-artifact@v8
        with:
          name: wasm-build
          path: engine-wasm/pkg/

      - name: Verify WASM build artifact
        run: |
          if [ -f engine-wasm/pkg/schach9x9_bg.wasm ]; then
            echo "✅ WASM artifact found (schach9x9): $(stat -c%s engine-wasm/pkg/schach9x9_bg.wasm) bytes"
          elif [ -f engine-wasm/pkg/engine_wasm_bg.wasm ]; then
            echo "✅ WASM artifact found (engine_wasm): $(stat -c%s engine-wasm/pkg/engine_wasm_bg.wasm) bytes"
          else
            echo "❌ WASM artifact not found!"
            ls -la engine-wasm/pkg/ || true
            exit 1
          fi

      - name: Run unit tests with coverage
        run: npm run test:coverage
        timeout-minutes: 25

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v7
        if: success() || failure()
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage/lcov.info
          flags: unittests
          fail_ci_if_error: false

      - name: Upload coverage report
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: coverage-report-${{ matrix.node-version }}
          path: coverage/
          retention-days: 7

      - name: Run fuzz tests
        run: npm test tests/fuzz/fuzz.test.ts

      - name: Test summary
        if: always()
        run: |
          echo "## Test Summary (Node ${{ matrix.node-version }})" >> $GITHUB_STEP_SUMMARY
          echo "Tests run: 1857" >> $GITHUB_STEP_SUMMARY
          echo "Status: ${{ job.status }}" >> $GITHUB_STEP_SUMMARY

  # =======================================================================
  # E2E TESTS (Playwright) - Non-blocking
  # =======================================================================
  e2e-test:
    name: E2E Tests (Playwright)
    runs-on: ubuntu-latest
    timeout-minutes: 75
    needs: [build]
    steps:
      - uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Cache node_modules
        uses: actions/cache@v5
        id: node-modules-cache
        with:
          path: node_modules
          key: ${{ runner.os }}-node-modules-${{ env.NPM_CACHE_VERSION }}-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-modules-${{ env.NPM_CACHE_VERSION }}-

      - name: Cache Playwright browsers
        uses: actions/cache@v5
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ env.PLAYWRIGHT_CACHE_VERSION }}-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-playwright-${{ env.PLAYWRIGHT_CACHE_VERSION }}-

      - name: Install dependencies
        if: steps.node-modules-cache.outputs.cache-hit != 'true'
        run: npm ci --legacy-peer-deps

      - name: Rebuild native bindings (fixes npm optional deps bug)
        run: npm rebuild rolldown vite

      - name: Download build artifact
        uses: actions/download-artifact@v8
        with:
          name: production-build
          path: dist/

      - name: Install Playwright Browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      - name: Run Playwright tests
        run: npx playwright test --reporter=github
        timeout-minutes: 60

      - name: E2E test summary
        if: always()
        run: |
          echo "## E2E Test Summary" >> $GITHUB_STEP_SUMMARY
          echo "Status: ${{ job.status }}" >> $GITHUB_STEP_SUMMARY

      - name: Run Visual Regression tests
        run: npm run test:visual

      - name: Upload Playwright report
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

  # =======================================================================
  # WASM ENGINE BUILD & TESTS (Non-blocking)
  # =======================================================================
  wasm-build:
    name: WASM Engine Build & Test
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v7

      - name: Cache Rust dependencies
        uses: actions/cache@v5
        id: rust-cache
        with:
          path: |
            ~/.cargo/bin
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-${{ env.RUST_CACHE_VERSION }}-${{ hashFiles('engine-wasm/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-${{ env.RUST_CACHE_VERSION }}-

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Install wasm-pack
        run: |
          cargo install wasm-pack --locked --force
          echo "wasm-pack version: $(wasm-pack --version)"

      - name: Build WASM engine
        working-directory: engine-wasm
        run: |
          wasm-pack build --target web --release
          echo "Build completed successfully"
          ls -la pkg/

      - name: Run WASM engine tests
        working-directory: engine-wasm
        run: cargo test --release 2>&1 | tee test_output.txt
        timeout-minutes: 20

      - name: Verify WASM module size
        working-directory: engine-wasm
        run: |
          if [ -f pkg/schach9x9_bg.wasm ]; then
            SIZE=$(stat -c%s pkg/schach9x9_bg.wasm)
            echo "WASM size: $SIZE bytes ($((SIZE / 1024)) KB)"
            if [ $SIZE -gt 2000000 ]; then
              echo "⚠️ WASM module exceeds 2MB!"
              exit 1
            fi
            echo "✅ WASM size within budget"
          else
            echo "❌ WASM file not found"
            exit 1
          fi

      - name: WASM build summary
        if: always()
        run: |
          echo "## WASM Build Summary" >> $GITHUB_STEP_SUMMARY
          if [ -f engine-wasm/pkg/schach9x9_bg.wasm ]; then
            SIZE=$(stat -c%s engine-wasm/pkg/schach9x9_bg.wasm)
            echo "WASM size: $((SIZE / 1024)) KB" >> $GITHUB_STEP_SUMMARY
            echo "Status: ✅ Built" >> $GITHUB_STEP_SUMMARY
          else
            echo "Status: ❌ Build failed" >> $GITHUB_STEP_SUMMARY
          fi
          echo "Job status: ${{ job.status }}" >> $GITHUB_STEP_SUMMARY

      - name: Upload WASM build artifact
        if: success() || failure()
        uses: actions/upload-artifact@v7
        with:
          name: wasm-build
          path: engine-wasm/pkg/
          retention-days: 1

  # =======================================================================
  # SECURITY & DEPENDENCY AUDIT (Non-blocking)
  # =======================================================================
  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Cache node_modules
        uses: actions/cache@v5
        id: node-modules-cache
        with:
          path: node_modules
          key: ${{ runner.os }}-node-modules-${{ env.NPM_CACHE_VERSION }}-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-modules-${{ env.NPM_CACHE_VERSION }}-

      - name: Install dependencies
        if: steps.node-modules-cache.outputs.cache-hit != 'true'
        run: npm ci --legacy-peer-deps

      - name: Rebuild native bindings (fixes npm optional deps bug)
        run: npm rebuild rolldown vite

      - name: Run npm audit
        id: npm-audit
        run: |
          npm audit --audit-level=high --omit=dev --json > audit-report.json || true
          cat audit-report.json | jq -r '.metadata.vulnerabilities | to_entries[] | "\(.key): \(.value)"' > audit-summary.txt
          echo "## Security Audit Summary" >> $GITHUB_STEP_SUMMARY
          cat audit-summary.txt >> $GITHUB_STEP_SUMMARY

      - name: Check for outdated packages
        run: |
          npx npm-check-updates -f '/^[^@]/' --rejected --timeout 10000 > outdated.txt || true
          cat outdated.txt >> $GITHUB_STEP_SUMMARY

      - name: Run Snyk security scan
        uses: snyk/actions/node@master
        if: env.SNYK_TOKEN != ''
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

      - name: Upload audit report
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: security-audit-report
          path: |
            audit-report.json
            audit-summary.txt
            outdated.txt
          retention-days: 7

  # =======================================================================
  # BUILD & PERFORMANCE BENCHMARK
  # =======================================================================
  build:
    name: Production Build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Cache node_modules
        uses: actions/cache@v5
        id: node-modules-cache
        with:
          path: node_modules
          key: ${{ runner.os }}-node-modules-${{ env.NPM_CACHE_VERSION }}-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-modules-${{ env.NPM_CACHE_VERSION }}-

      - name: Cache Vite build cache
        uses: actions/cache@v5
        id: vite-cache
        with:
          path: node_modules/.vite
          key: ${{ runner.os }}-vite-${{ env.NPM_CACHE_VERSION }}-${{ hashFiles('package-lock.json', 'vite.config.ts') }}
          restore-keys: |
            ${{ runner.os }}-vite-${{ env.NPM_CACHE_VERSION }}-

      - name: Install dependencies
        if: steps.node-modules-cache.outputs.cache-hit != 'true'
        run: npm ci --legacy-peer-deps

      - name: Rebuild native bindings (fixes npm optional deps bug)
        run: npm rebuild rolldown vite

      - name: Build production bundle
        run: npm run build
        env:
          NODE_OPTIONS: '--max-old-space-size=4096'

      - name: Verify build output
        run: |
          if [ ! -d "dist" ]; then
            echo "❌ dist directory not created"
            exit 1
          fi
          echo "Build size:"
          du -sh dist/
          find dist -name "*.js" -exec wc -c {} \; | sort -rn | head -5

      - name: Build summary
        if: always()
        run: |
          echo "## Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "Dist size: $(du -sh dist/)" >> $GITHUB_STEP_SUMMARY
          BUNDLE_JS=$(find dist -name "*.js" -exec wc -c {} + | tail -1 | awk '{print $1}')
          BUNDLE_CSS=$(find dist -name "*.css" -exec wc -c {} + | tail -1 | awk '{print $1}')
          BUNDLE_WASM=$(find dist -name "*.wasm" -exec wc -c {} + | tail -1 | awk '{print $1}')
          echo "JS: $((BUNDLE_JS / 1024)) KB" >> $GITHUB_STEP_SUMMARY
          echo "CSS: $((BUNDLE_CSS / 1024)) KB" >> $GITHUB_STEP_SUMMARY
          echo "WASM: $((BUNDLE_WASM / 1024)) KB" >> $GITHUB_STEP_SUMMARY

      - name: Bundle Size Diff (PR only)
        if: github.event_name == 'pull_request'
        run: |
          echo "📦 Checking production bundle size..."
          TOTAL_SIZE=$(du -sb dist/ | cut -f1)
          echo "Total dist size: $TOTAL_SIZE bytes ($(($TOTAL_SIZE / 1024)) KB)"
          
          JS_SIZE=$(find dist -name "*.js" -exec wc -c {} + | tail -1 | awk '{print $1}')
          CSS_SIZE=$(find dist -name "*.css" -exec wc -c {} + | tail -1 | awk '{print $1}')
          WASM_SIZE=$(find dist -name "*.wasm" -exec wc -c {} + | tail -1 | awk '{print $1}')
          
          echo "JS bundle: $(($JS_SIZE / 1024)) KB"
          echo "CSS: $(($CSS_SIZE / 1024)) KB"
          echo "WASM: $(($WASM_SIZE / 1024)) KB"
          
          # Budget check: 1200 KB total (JS bundles + CSS + WASM)
          MAX_SIZE=$((1200 * 1024))
          if [ $TOTAL_SIZE -gt $MAX_SIZE ]; then
            echo "❌ Bundle exceeds 1200 KB budget!"
            exit 1
          fi
          echo "✅ Bundle size within budget"

      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: production-build
          path: dist/
          retention-days: 7

      - name: Lighthouse CI (Performance Budget)
        uses: treosh/lighthouse-ci-action@v12
        if: github.event_name == 'pull_request'
        continue-on-error: true
        with:
          urls: |
            https://bumblei3.github.io/schach9x9/
          budgetPath: .github/lighthouse-ci.json
          uploadArtifacts: true
  # =======================================================================
  # DEPLOY TO GITHUB PAGES
  # =======================================================================
  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    # Prevent parallel GitHub Pages deployments (queue instead of cancel)
    concurrency:
      group: 'deploy-github-pages'
      cancel-in-progress: false
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: [lint, build]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Pages
        uses: actions/configure-pages@v6

      - name: Download build artifact
        uses: actions/download-artifact@v8
        with:
          name: production-build
          path: dist/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: dist/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5

      - name: Comment on deployment
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v9
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: ${{ github.event.number }},
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '🚀 Deployment to GitHub Pages successful!\n\n**Live:** ${{ steps.deployment.outputs.page_url }}\n\n**Commit:** ${ github.sha }\n**Workflow:** ${ github.run_id }'
            })