name: CI/CD

on:
  push:
    branches: ['main', 'master']
  pull_request:
    branches: ['main', 'master']
  workflow_dispatch:
  schedule:
    # Weekly schedule for regression detection
    - cron: '0 2 * * 1'

# Sets permissions of the GITHUB_TOKEN
permissions:
  contents: read
  pages: write
  id-token: write
  checks: write
  pull-requests: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress
concurrency:
  group: 'ci-${{ github.ref }}-${{ github.workflow }}'
  cancel-in-progress: true

env:
  # Pin Node.js version for reproducible builds
  NODE_VERSION: '22.11.0'
  # Cache versions for reproducibility
  NPM_CACHE_VERSION: '1'
  PLAYWRIGHT_CACHE_VERSION: '1'
  RUST_CACHE_VERSION: '1'

jobs:
  # =======================================================================
  # LINT & TYPE CHECK (Fast, runs first)
  # =======================================================================
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Needed for commit message linting

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

      - name: Run TypeScript type check
        run: npx tsc --noEmit

      - name: Run Commitlint (if PR)
        if: github.event_name == 'pull_request'
        run: |
          npm install -g @commitlint/cli @commitlint/config-conventional
          git fetch origin main
          commitlint --from=origin/main --to=HEAD --verbose

  # =======================================================================
  # UNIT TESTS (Fast, parallelizable)
  # =======================================================================
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      matrix:
        node-version: ['18', '20', '22']
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests with coverage
        run: npm run test:coverage

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage/lcov.info
          flags: unittests
          fail_ci_if_error: true

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report-${{ matrix.node-version }}
          path: coverage/
          retention-days: 7

      - name: Run fuzz tests
        run: npm test tests/fuzz/fuzz.test.ts

  # =======================================================================
  # E2E TESTS (Playwright)
  # =======================================================================
  e2e-test:
    name: E2E Tests (Playwright)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ env.PLAYWRIGHT_CACHE_VERSION }}-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-playwright-${{ env.PLAYWRIGHT_CACHE_VERSION }}-

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      - name: Run Playwright tests
        run: npx playwright test --reporter=github

      - name: Run Visual Regression tests
        run: npm run test:visual

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

  # =======================================================================
  # WASM ENGINE BUILD & TESTS
  # =======================================================================
  wasm-build:
    name: WASM Engine Build & Test
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Cache Rust dependencies
        uses: actions/cache@v4
        id: rust-cache
        with:
          path: |
            ~/.cargo/bin
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            engine-wasm/target
          key: ${{ runner.os }}-cargo-${{ env.RUST_CACHE_VERSION }}-${{ hashFiles('engine-wasm/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-${{ env.RUST_CACHE_VERSION }}-

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Install wasm-pack
        run: cargo install wasm-pack

      - name: Build WASM engine
        working-directory: engine-wasm
        run: wasm-pack build --target web --release

      - name: Run WASM engine tests
        working-directory: engine-wasm
        run: cargo test --release

      - name: Verify WASM module size
        working-directory: engine-wasm
        run: |
          SIZE=$(stat -c%s pkg/schach9x9_bg.wasm)
          echo "WASM size: $SIZE bytes"
          if [ $SIZE -gt 2000000 ]; then
            echo "⚠️ WASM module exceeds 2MB!"
            exit 1
          fi

  # =======================================================================
  # SECURITY & DEPENDENCY AUDIT
  # =======================================================================
  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run npm audit
        run: npm audit --audit-level=high --omit=dev
        continue-on-error: false

      - name: Check for outdated packages
        run: npx npm-check-updates -f '/^[^@]/' --rejected --timeout 10000
        continue-on-error: true

      - name: Run Snyk security scan
        uses: snyk/actions/node@master
        if: env.SNYK_TOKEN != ''
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

  # =======================================================================
  # BUILD & PERFORMANCE BENCHMARK
  # =======================================================================
  build:
    name: Production Build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [lint, test, security-audit]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build production bundle
        run: npm run build

      - name: Verify build output
        run: |
          if [ ! -d "dist" ]; then
            echo "❌ dist directory not created"
            exit 1
          fi
          echo "Build size:"
          du -sh dist/
          find dist -name "*.js" -exec wc -c {} \; | sort -rn | head -5

      - name: Bundle Size Diff (PR only)
        if: github.event_name == 'pull_request'
        uses: github-action-bundle-diff@v1
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          dist-dir: dist
          check-size-budget: true
          max-bundle-size: 500 KB
          output-format: markdown
          comment-on-pr: true

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: production-build
          path: dist/
          retention-days: 7

      - name: Lighthouse CI (Performance Budget)
        uses: treosh/lighthouse-ci-action@v11
        if: github.event_name == 'pull_request'
        with:
          urls: |
            https://bumblei3.github.io/schach9x9/
          budgetPath: .github/lighthouse-ci.json
          uploadArtifacts: true

  # =======================================================================
  # DEPLOY TO GITHUB PAGES
  # =======================================================================
  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: [lint, test, e2e-test, wasm-build, security-audit, build]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: dist/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5

      - name: Comment on deployment
        if: github.event_name == 'push'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: ${ { github.event.number || 0 } },
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '🚀 Deployment to GitHub Pages successful!\n\n**Live:** ${{ steps.deployment.outputs.page_url }}\n\n**Commit:** ${ github.sha }\n**Workflow:** ${ github.run_id }'
            }