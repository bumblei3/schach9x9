name: Dependabot Validation

# Validates Dependabot PRs with a BLOCKING gate (tsc + unit tests) so their
# status is visible in CI. Auto-merge has been DISABLED (see PR) — Dependabot
# PRs are left for manual review/merge by the maintainer.
#
# The validation job is intentionally BLOCKING (continue-on-error: false) for
# Dependabot PRs only — it is the gate that decides whether an update is safe.
# This does not affect the non-blocking main CI pipeline used for normal dev.

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read # validation only; no merge needed
  pull-requests: read # read PR metadata
  checks: read

jobs:
  # ----------------------------------------------------------------------
  # BLOCKING validation gate for Dependabot PRs only
  # ----------------------------------------------------------------------
  validate:
    name: Validate Dependabot PR
    if: github.event.pull_request.user.login == 'dependabot[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    continue-on-error: false
    steps:
      - uses: actions/checkout@v7

      - name: Setup Node.js & dependencies
        uses: ./.github/actions/setup-node-deps
        with:
          node-version: '24.0.0'
          cache-version: '3'

      - name: Type check
        run: npx tsc --noEmit

      - name: Unit tests
        run: npm test -- --run
