version: 2
updates:
  # npm dependencies
  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'monday'
      time: '03:00'
      timezone: 'Europe/Berlin'
    open-pull-requests-limit: 10
    # Avoid large unreviewed bundles; prefer focused single-package PRs instead
    commit-message:
      prefix: 'chore(deps)'
      prefix-development: 'chore(deps-dev)'

  # GitHub Actions
  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'monday'
      time: '03:30'
      timezone: 'Europe/Berlin'
    open-pull-requests-limit: 5
    # No groups: keep focused single-package PRs (matches npm section philosophy).
    # Pairing `groups` with `commit-message.prefix` causes a doubled prefix
    # (e.g. "chore(ci)(ci):") in PR titles, so we keep the prefix only.
    allow:
      - dependency-type: 'production'
        update-type: 'version-update:semver-patch'
      - dependency-type: 'production'
        update-type: 'version-update:semver-minor'
    commit-message:
      prefix: 'chore(ci)'
