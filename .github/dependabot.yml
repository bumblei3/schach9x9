version: 2
updates:
  # npm dependencies
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Europe/Berlin"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "npm"
    commit-message:
      prefix: "chore(deps)"
      prefix-development: "chore(deps-dev)"
      include: "scope"
    groups:
      development-dependencies:
        patterns:
          - "@*"
          - "eslint*"
          - "vitest*"
          - "playwright*"
          - "typescript*"
          - "@typescript-eslint*"
        update-types:
          - "minor"
          - "patch"
      runtime-dependencies:
        patterns:
          - "*"
        exclude-patterns:
          - "@*"
          - "eslint*"
          - "vitest*"
          - "playwright*"
          - "typescript*"
          - "@typescript-eslint*"
        update-types:
          - "minor"
          - "patch"
  
  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:30"
      timezone: "Europe/Berlin"
    labels:
      - "dependencies"
      - "github-actions"
    commit-message:
      prefix: "ci(deps)"