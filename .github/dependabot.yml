version: 2
updates:
  # npm dependencies
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "03:00"
      timezone: "Europe/Berlin"
    open-pull-requests-limit: 10
    groups:
      dev-dependencies:
        patterns:
          - "@*"
          - "eslint*"
          - "typescript*"
          - "vitest*"
          - "playwright*"
          - "prettier"
          - "husky"
        update-types:
          - "patch"
          - "minor"
      prod-dependencies:
        patterns:
          - "three"
        update-types:
          - "patch"
          - "minor"
    # Auto-merge for patch/minor if CI passes
    allow:
      - dependency-type: "development"
        update-type: "version-update:semver-patch"
      - dependency-type: "development"
        update-type: "version-update:semver-minor"
      - dependency-type: "production"
        update-type: "version-update:semver-patch"
      - dependency-type: "production"
        update-type: "version-update:semver-minor"
    commit-message:
      prefix: "chore(deps)"
      prefix-development: "chore(deps-dev)"

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "03:30"
      timezone: "Europe/Berlin"
    open-pull-requests-limit: 5
    groups:
      github-actions:
        patterns:
          - "*"
        update-types:
          - "patch"
          - "minor"
    allow:
      - dependency-type: "production"
        update-type: "version-update:semver-patch"
      - dependency-type: "production"
        update-type: "version-update:semver-minor"
    commit-message:
      prefix: "chore(ci)"